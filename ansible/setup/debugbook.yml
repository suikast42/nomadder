# https://docs.ansible.com/ansible/latest/user_guide/playbooks_debugger.html
---
# Ping everything first
- hosts: all
  # Do not gater facts at first
  gather_facts: true
  vars_files:
    - vars/versions.yml
    - vars/job_secrets.yml
    - vars/vault.yml
    - vars/common_vars.yml
    - vars/local_secret.yml
  tasks:
    - name: "Is devnode"
      debug:
        msg: "{{ is_devnode }} {{ansible_user}}"

    - name: Ping test
      ping:
    - name: "Host IP"
      debug:
        msg: "{{ host_ip }}"
#      vars:
#        host_ip_var: "{{ ansible_facts['eth0']['ipv4']['address']}}"
    - name: "Host IPS"
      debug:
        msg: "{{ host_ips }}"

    - name: Ping google IP
      changed_when: false
      shell: |
        ping -c 4 8.8.8.8
      register: ping_result
      failed_when: ping_result.rc != 0

    - name: "create hasibongo"
      become: true
      delay: 0
      async: 60
      poll: 1
      shell: |
        touch /bin/hasibongo.sh
        rm /bin/hasibongo.sh
# The docker login will fail on localhost because
# DOCKER_HOST ist set to the buildhost and all docker commands on localhost will executed on this hosts
# Activate localhost after migrate to local docker build
- hosts: all,!localhost
  gather_facts: yes
  vars_files:
    - vars/versions.yml
    - vars/common_vars.yml
    - vars/job_secrets.yml
    - vars/vault.yml
    - vars/local_secret.yml
  debugger: never
  tasks:
    - name: Tests
      block:
#    - name: Execute a command
#      ansible.builtin.command: "false"
#      debugger: on_failed

      - name: "Test delegate to localhost"
        delegate_to: localhost
        become: true
        delay: 0
        async: 60
        poll: 1
        shell: |
          touch /bin/hasibongo.sh
          rm /bin/hasibongo.sh

