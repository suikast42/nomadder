---
- hosts: localhost
  gather_facts: true
  vars_files:
    - vars/common_vars.yml
    - vars/local_secret.yml
  tasks:
    # If dnsmasq is not installed then we neeed at least one nameserver entry of the cluster on the localhost
    - name : Check dnsmasq installation present
      stat:
        path: /usr/sbin/dnsmasq
      register: dnsmaqInstalled

    - name: Add nameserver to localhost
      failed_when: false
      when: not dnsmaqInstalled.stat.exists
      become: true
      lineinfile:
        state: present
        path: /etc/resolv.conf
        firstmatch: yes
        insertbefore: "nameserver.*"
        line: "nameserver {{worker_01_ip}}"
  tags:
    - always

# start the deployment jobs on master_0
- hosts: all,!localhost
  name: "Create stack core volumes"
  vars_files:
    - vars/versions.yml
    - vars/common_vars.yml
    - vars/vault.yml
    - vars/local_secret.yml
  gather_facts: yes
  roles:
    - {role: stack_core_volumes, tags: ['stack_core','stack_core_volumes']}
    - {role: stack_observability_volumes, tags: ['stack_observability','stack_obcservability_volumes']}

- hosts: masters[0]
  name: "Master [0] stack core deployment"
  vars_files:
    - vars/versions.yml
    - vars/common_vars.yml
    - vars/vault.yml
    - vars/job_secrets.yml
    - vars/local_secret.yml
  gather_facts: yes
  roles:
    - {role: stack_core, tags: ['stack_core','stack_core_build']}
    - {role: stack_observability, tags: ['stack_observability','stack_observability_build']}

- hosts: all,!localhost
  name: "Stack observability node setups"
  vars_files:
    - vars/versions.yml
    - vars/common_vars.yml
    - vars/vault.yml
    - vars/job_secrets.yml
    - vars/local_secret.yml
  gather_facts: yes
  roles:
    - {role: stack_observability_nodesetup, tags: ['stack_observability_nodes','grafana_agent','grafana_alloy','vector_agent']}

- hosts: all
  name: "Stack observability cli tools setups"
  vars_files:
    - vars/versions.yml
    - vars/common_vars.yml
    - vars/vault.yml
    - vars/job_secrets.yml
    - vars/local_secret.yml
  gather_facts: yes
  roles:
    - {role: stack_observability_cli_tools, tags: ['stack_observability_cli_tools','cli_tools']}
