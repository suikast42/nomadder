---
- name: "Uninstall zsh"
  become: true
  community.general.gem:
    name: colorls
    user_install: false
    state: present

- name: "Dos2unix"
  become: true
  shell: |
    rm -fR /home/{{ansible_ssh_user}}/.oh-my-zsh
    rm -fR /usr/local/bin/oh-my-posh
    rm -fR /home/{{ansible_ssh_user}}/.zshrc
    rm -fR /home/{{ansible_ssh_user}}/.oh-my-zsh/custom/themes/blueishv2.omp.json
  register: install
  failed_when: install.rc > 0



- name: "Install oh-my-zsh"
  become: false
  delay: 0
  async: 60
  poll: 1
  shell: |
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    git clone https://github.com/zsh-users/zsh-autosuggestions ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-autosuggestions
    git clone https://github.com/zsh-users/zsh-syntax-highlighting.git ${ZSH_CUSTOM:-~/.oh-my-zsh/custom}/plugins/zsh-syntax-highlighting
  register: install
  failed_when: install.rc > 0
  args:
    creates: ~/.oh-my-zsh # oh-my-zs is already installed

- name: "Install oh-my-posh"
  become: true
  delay: 0
  async: 360
  poll: 1
  shell: |
    wget https://github.com/JanDeDobbeleer/oh-my-posh/releases/latest/download/posh-linux-amd64 -O /usr/local/bin/oh-my-posh
    chmod +x /usr/local/bin/oh-my-posh
  args:
    creates: /usr/local/bin/oh-my-posh # oh-my-posh is already installed

- name: Gem install colorls
  become: true
  community.general.gem:
    name: colorls
    user_install: false
    state: present


- name: Template zshrc
  template:
    force: yes
    src: .zshrc
    dest: "{{ansible_env.HOME}}/.zshrc"
    group: "{{ansible_ssh_user}}"
    owner: "{{ansible_ssh_user}}"
    mode: 0644


- name: Template zshrc
  template:
    force: yes
    src: .zshrc
    dest: "{{ansible_env.HOME}}/.zshrc"
    group: "{{ansible_ssh_user}}"
    owner: "{{ansible_ssh_user}}"
    mode: 0644

- name: Template zshenv
  when: not is_devnode
  template:
    force: yes
    src: .zshenv
    dest: "{{ ansible_env.HOME }}/.zshenv"
    group: "{{ansible_ssh_user}}"
    owner: "{{ansible_ssh_user}}"
    mode: 0644

- name: Ensure ~/.profile sources ~/.zshenv for graphical sessions
  when: not is_devnode
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.profile"
    # The 'line' is the exact text we want to appear
    line: 'if [ -f "$HOME/.zshenv" ]; then . "$HOME/.zshenv"; fi'
    # The 'regexp' ensures that if a similar line exists, it is replaced instead of duplicated
    regexp: '^if \[ -f "\$HOME/.zshenv" \].*'
    state: present
    create: yes
    firstmatch: yes
    insertafter: EOF
    mode: '0644'

- name: Copy theme
  ansible.builtin.copy:
    force: yes
    src: blueishv2.omp.json
    dest: "{{ansible_env.HOME}}/.oh-my-zsh/custom/themes/blueishv2.omp.json"
    group: "{{ansible_ssh_user}}"
    owner: "{{ansible_ssh_user}}"
    mode: 0644

- name: "Dos2unix"
  delay: 0
  async: 60
  poll: 1
  shell: |
    dos2unix /home/{{ansible_ssh_user}}/.zsh*

- name: "Set login shell of user {{ ansible_ssh_user }} to `zsh` with `usermod`"
  shell: "usermod --shell $(which zsh) {{ ansible_ssh_user }}"
  become: true
  changed_when: false
